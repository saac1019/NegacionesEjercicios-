<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios Variados de Negación en Inglés</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        p.description {
            text-align: center;
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .section-title {
            background-color: #34495e;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .question-row {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            background-color: #f9fbfd;
            border-left: 4px solid #3498db;
            font-size: 16px;
        }
        .question-number {
            font-weight: bold;
            color: #2980b9;
            margin-right: 10px;
        }
        select, input[type="text"] {
            padding: 6px 10px;
            font-size: 15px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }
        input[type="text"] {
            width: 80px;
            text-align: center;
        }
        select:focus, input[type="text"]:focus {
            border-color: #3498db;
        }
        .radio-group {
            display: inline-block;
            margin: 0 10px;
        }
        .radio-group label {
            margin-right: 15px;
            cursor: pointer;
        }
        .transform-hint {
            display: block;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-style: italic;
        }
        .correct-element {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }
        .incorrect-element {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }
        .btn-check {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            transition: background-color 0.3s;
        }
        .btn-check:hover {
            background-color: #27ae60;
        }
        .result-container {
            text-align: center;
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Reto Completo: Negaciones en Inglés</h1>
    <p class="description">
        Palabras a utilizar: <strong>don't, doesn't, didn't, wasn't, weren't, isn't, aren't, won't</strong><br>
        <em>Nota: En los campos de texto, asegúrate de escribir bien el apóstrofe (').</em>
    </p>

    <div id="exercises-container"></div>

    <button class="btn-check" onclick="checkAnswers()">Evaluar mis respuestas</button>
    <div id="result" class="result-container"></div>
</div>

<script>
    const allQuestions = [
        // PARTE 1: Menú Desplegable (1-10)
        { type: 'select', pre: "She", answer: "doesn't", post: "like eating apples." },
        { type: 'select', pre: "I", answer: "didn't", post: "go to the park yesterday." },
        { type: 'select', pre: "They", answer: "aren't", post: "playing soccer right now." },
        { type: 'select', pre: "He", answer: "wasn't", post: "at home last night." },
        { type: 'select', pre: "We", answer: "won't", post: "go to the party tomorrow." },
        { type: 'select', pre: "It", answer: "isn't", post: "raining today." },
        { type: 'select', pre: "You", answer: "don't", post: "understand the question." },
        { type: 'select', pre: "The dogs", answer: "weren't", post: "barking loudly yesterday." },
        { type: 'select', pre: "Mary", answer: "doesn't", post: "want to watch a movie." },
        { type: 'select', pre: "The car", answer: "isn't", post: "working properly." },

        // PARTE 2: Escribir la respuesta (11-20)
        { type: 'input', pre: "We", answer: "weren't", post: "at the beach last weekend." },
        { type: 'input', pre: "He", answer: "didn't", post: "finish his homework on time." },
        { type: 'input', pre: "I promise I", answer: "won't", post: "tell anyone your secret." },
        { type: 'input', pre: "They", answer: "don't", post: "speak French fluently." },
        { type: 'input', pre: "The cat", answer: "isn't", post: "sleeping on the sofa." },
        { type: 'input', pre: "She", answer: "wasn't", post: "happy with the exam results." },
        { type: 'input', pre: "You", answer: "aren't", post: "coming to the meeting, right?" },
        { type: 'input', pre: "John and Peter", answer: "don't", post: "know the answer." },
        { type: 'input', pre: "The train", answer: "won't", post: "arrive until 8 PM." },
        { type: 'input', pre: "I", answer: "didn't", post: "see the stop sign." },

        // PARTE 3: Selección Múltiple (21-30)
        { type: 'radio', pre: "My phone", options: ["isn't", "wasn't", "doesn't"], answer: "isn't", post: "charged right now." },
        { type: 'radio', pre: "We", options: ["don't", "aren't", "weren't"], answer: "don't", post: "agree with that decision." },
        { type: 'radio', pre: "The keys", options: ["weren't", "didn't", "isn't"], answer: "weren't", post: "on the table yesterday." },
        { type: 'radio', pre: "He", options: ["wasn't", "didn't", "doesn't"], answer: "wasn't", post: "playing video games when I called." },
        { type: 'radio', pre: "She", options: ["won't", "isn't", "didn't"], answer: "won't", post: "help us next week." },
        { type: 'radio', pre: "The stores", options: ["aren't", "don't", "weren't"], answer: "aren't", post: "open on Sundays." },
        { type: 'radio', pre: "It", options: ["doesn't", "isn't", "won't"], answer: "doesn't", post: "matter anymore." },
        { type: 'radio', pre: "They", options: ["didn't", "weren't", "aren't"], answer: "didn't", post: "buy the house after all." },
        { type: 'radio', pre: "You", options: ["aren't", "don't", "weren't"], answer: "aren't", post: "listening to me!" },
        { type: 'radio', pre: "The weather", options: ["wasn't", "isn't", "didn't"], answer: "wasn't", post: "cold yesterday." },

        // PARTE 4: Transformación (Afirmativo a Negativo) (31-40)
        { type: 'transform', hint: "We had money.", pre: "We", answer: "didn't", post: "have money." },
        { type: 'transform', hint: "He cares about it.", pre: "He", answer: "doesn't", post: "care about it." },
        { type: 'transform', hint: "The birds are flying.", pre: "The birds", answer: "aren't", post: "flying." },
        { type: 'transform', hint: "I will attend.", pre: "I", answer: "won't", post: "attend." },
        { type: 'transform', hint: "The food tastes good.", pre: "The food", answer: "doesn't", post: "taste good." },
        { type: 'transform', hint: "My friends were invited.", pre: "My friends", answer: "weren't", post: "invited." },
        { type: 'transform', hint: "She answered the phone.", pre: "She", answer: "didn't", post: "answer the phone." },
        { type: 'transform', hint: "This is what I ordered.", pre: "This", answer: "isn't", post: "what I ordered." },
        { type: 'transform', hint: "They need help.", pre: "They", answer: "don't", post: "need help." },
        { type: 'transform', hint: "The sun will shine.", pre: "The sun", answer: "won't", post: "shine." }
    ];

    const standardOptions = ["don't", "doesn't", "didn't", "wasn't", "weren't", "isn't", "aren't", "won't"];
    const container = document.getElementById('exercises-container');

    // Construir el HTML agrupado por secciones
    let currentSection = '';
    
    allQuestions.forEach((q, index) => {
        // Títulos de sección
        if (index === 0) {
            container.innerHTML += `<h2 class="section-title">Parte 1: Selecciona la opción correcta</h2>`;
        } else if (index === 10) {
            container.innerHTML += `<h2 class="section-title">Parte 2: Escribe la negación correcta</h2>`;
        } else if (index === 20) {
            container.innerHTML += `<h2 class="section-title">Parte 3: Selección múltiple</h2>`;
        } else if (index === 30) {
            container.innerHTML += `<h2 class="section-title">Parte 4: Pasa la oración a negativo</h2>`;
        }

        const row = document.createElement('div');
        row.className = 'question-row';
        row.id = `row-${index}`;

        let interactiveHTML = '';

        if (q.type === 'select') {
            interactiveHTML = `<select id="q${index}"><option value="">---</option>`;
            standardOptions.forEach(opt => {
                interactiveHTML += `<option value="${opt}">${opt}</option>`;
            });
            interactiveHTML += `</select>`;
            row.innerHTML = `<span class="question-number">${index + 1}.</span> ${q.pre} ${interactiveHTML} ${q.post}`;
        
        } else if (q.type === 'input') {
            interactiveHTML = `<input type="text" id="q${index}" placeholder="???">`;
            row.innerHTML = `<span class="question-number">${index + 1}.</span> ${q.pre} ${interactiveHTML} ${q.post}`;
        
        } else if (q.type === 'radio') {
            interactiveHTML = `<div class="radio-group" id="q${index}">`;
            q.options.forEach(opt => {
                interactiveHTML += `<label><input type="radio" name="radio${index}" value="${opt}"> ${opt}</label>`;
            });
            interactiveHTML += `</div>`;
            row.innerHTML = `<span class="question-number">${index + 1}.</span> ${q.pre} ${interactiveHTML} ${q.post}`;
        
        } else if (q.type === 'transform') {
            interactiveHTML = `<input type="text" id="q${index}" placeholder="???">`;
            row.innerHTML = `
                <span class="transform-hint">Afirmativo: ${q.hint}</span>
                <span class="question-number">${index + 1}.</span> ${q.pre} ${interactiveHTML} ${q.post}
            `;
        }

        container.appendChild(row);
    });

    // Función de evaluación
    function checkAnswers() {
        let score = 0;

        allQuestions.forEach((q, index) => {
            const rowElement = document.getElementById(`row-${index}`);
            let userAnswer = "";
            let interactiveElement;

            // Obtener la respuesta del usuario dependiendo del tipo de ejercicio
            if (q.type === 'select' || q.type === 'input' || q.type === 'transform') {
                interactiveElement = document.getElementById(`q${index}`);
                userAnswer = interactiveElement.value.trim().toLowerCase();
                
                // Limpiar clases
                interactiveElement.classList.remove('correct-element', 'incorrect-element');
            } else if (q.type === 'radio') {
                interactiveElement = document.getElementById(`q${index}`);
                const checkedRadio = document.querySelector(`input[name="radio${index}"]:checked`);
                if (checkedRadio) {
                    userAnswer = checkedRadio.value;
                }
                interactiveElement.classList.remove('correct-element', 'incorrect-element');
            }

            // Validar
            if (userAnswer === q.answer.toLowerCase()) {
                score++;
                if (q.type !== 'radio') interactiveElement.classList.add('correct-element');
                else interactiveElement.style.backgroundColor = '#d4edda'; // Resaltar el div de radios
            } else {
                if (q.type !== 'radio') interactiveElement.classList.add('incorrect-element');
                else interactiveElement.style.backgroundColor = '#f8d7da';
            }
        });

        const resultDiv = document.getElementById('result');
        let percentage = Math.round((score / allQuestions.length) * 100);
        
        if (score === allQuestions.length) {
            resultDiv.innerHTML = `¡Perfecto! ${score}/40 (${percentage}%). Eres un maestro de las negaciones. 🏆`;
            resultDiv.style.backgroundColor = "#d4edda";
            resultDiv.style.color = "#155724";
        } else if (score >= 25) {
            resultDiv.innerHTML = `¡Muy bien! Tienes ${score}/40 (${percentage}%). Revisa las marcadas en rojo y corrige tus fallos. 👍`;
            resultDiv.style.backgroundColor = "#fff3cd";
            resultDiv.style.color = "#856404";
        } else {
            resultDiv.innerHTML = `Obtuviste ${score}/40 (${percentage}%). Hay que repasar un poco más, ¡no te rindas! 💪`;
            resultDiv.style.backgroundColor = "#f8d7da";
            resultDiv.style.color = "#721c24";
        }
    }
</script>

</body>
</html>
